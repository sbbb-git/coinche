name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Déploiement Pages NATIF (un seul run, plus de branche gh-pages ni de builder
# « pages-build-deployment » en double). `configure-pages` avec enablement bascule
# automatiquement la source de Pages sur « GitHub Actions » (aucun réglage manuel).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Configurer GitHub Pages (source = Actions)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - name: Build (avec pub si configurée)
        # Pour ACTIVER les pubs : définir la variable de dépôt ADSENSE_CLIENT
        # (Settings -> Secrets and variables -> Actions -> Variables) = "ca-pub-XXXX".
        # Tant qu'elle est vide, aucune pub n'est injectée.
        env:
          ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT }}
          VITE_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT_HOME: ${{ vars.ADSENSE_SLOT_HOME }}
          VITE_ADSENSE_SLOT_STATS: ${{ vars.ADSENSE_SLOT_STATS }}
          VITE_ADSENSE_SLOT_EXERCISES: ${{ vars.ADSENSE_SLOT_EXERCISES }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
