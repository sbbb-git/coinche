name: Déploiement GitHub Pages

on:
  push:
    branches: [claude/coinche-game-app-5es6j5, main]
  workflow_dispatch:

# Publication sur la branche gh-pages (méthode « Deploy from a branch »), qui ne
# dépend PAS de l'environnement protégé github-pages : elle fonctionne donc
# depuis n'importe quelle branche.
permissions:
  contents: write

concurrency:
  group: pages-gh
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publier sur gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Évite que GitHub tente de traiter le site avec Jekyll.
          enable_jekyll: false
